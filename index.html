<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#060608">
<title>HOUSBERG STORE</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{font-family:'Inter',sans-serif;background:#060608;color:#f0f0f5;min-height:100vh;overscroll-behavior:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#5b4dcc;border-radius:2px}
img{display:block}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
@keyframes mIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes tIn{from{opacity:0;transform:translateY(8px) translateX(-50%)}to{opacity:1;transform:translateY(0) translateX(-50%)}}
@keyframes cPop{0%{transform:scale(1)}45%{transform:scale(1.4)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes adminIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* ── ORBS ── */
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
.orb1{width:380px;height:380px;background:rgba(124,109,255,.07);top:-100px;left:-100px}
.orb2{width:300px;height:300px;background:rgba(167,139,250,.04);bottom:-80px;right:-80px}

/* ── NAV ── */
.nav{position:sticky;top:0;z-index:50;background:rgba(6,6,8,.93);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.07);padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Unbounded',sans-serif;font-weight:900;font-size:14px;letter-spacing:.1em;background:linear-gradient(135deg,#fff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer;user-select:none;transition:transform .15s}
.logo:active{transform:scale(.92)}
.logo-dots{display:flex;gap:3px;margin-top:3px;justify-content:center}
.logo-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.15);transition:background .2s}
.logo-dot.active{background:#7c6dff}
.nav-right{display:flex;gap:5px;align-items:center}
.admin-badge{padding:4px 9px;border-radius:7px;background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.25);color:#f5c842;font-size:11px;font-weight:700;animation:adminIn .3s ease;display:flex;align-items:center;gap:4px}
.nav-profile-btn{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#7c6dff,#5b4dcc);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;font-weight:700;color:#fff;font-family:'Unbounded',sans-serif;overflow:hidden;flex-shrink:0;border:2px solid rgba(124,109,255,.3)}
.nav-profile-btn img{width:100%;height:100%;object-fit:cover}
.cart-bubble{width:36px;height:36px;border-radius:50%;background:#7c6dff;border:2px solid rgba(167,139,250,.4);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;box-shadow:0 0 14px rgba(124,109,255,.4);font-size:15px;flex-shrink:0}
.cart-bubble:active{transform:scale(.92)}
.cart-bubble.pop{animation:cPop .35s ease}
.cart-num{position:absolute;top:-5px;right:-5px;background:#ef4444;color:#fff;font-size:9px;font-weight:800;min-width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #060608;padding:0 2px}

/* ── PAGES ── */
.page{display:none;min-height:calc(100vh - 54px);position:relative;z-index:1}
.page.active{display:block;animation:fadeUp .25s ease}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:49;background:rgba(6,6,8,.95);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.07);display:flex;height:56px}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;transition:all .2s;border:none;background:none;color:#5a5a70;font-size:10px;font-weight:600;font-family:'Inter',sans-serif}
.bnav-btn.active{color:#7c6dff}
.bnav-btn .icon{font-size:20px;line-height:1}
.bnav-dot{width:4px;height:4px;border-radius:50%;background:#7c6dff;margin-top:1px;display:none}
.bnav-btn.active .bnav-dot{display:block}

/* ── HERO ── */
.hero{padding:30px 16px 16px;max-width:760px;margin:0 auto}
.hero-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(124,109,255,.1);border:1px solid rgba(124,109,255,.2);padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;color:#a78bfa;letter-spacing:.08em;text-transform:uppercase;margin-bottom:11px}
.hero-badge span{width:5px;height:5px;border-radius:50%;background:#7c6dff;animation:pulse 2s infinite;display:inline-block}
.hero h1{font-family:'Unbounded',sans-serif;font-weight:900;font-size:clamp(20px,5.5vw,38px);line-height:1.1;margin-bottom:7px}
.hero-accent{background:linear-gradient(135deg,#7c6dff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:13px;color:#9090a8;line-height:1.6}

/* ── ADMIN BAR ── */
.admin-bar{padding:0 16px 12px;max-width:760px;margin:0 auto;display:none;gap:8px;flex-wrap:wrap;animation:adminIn .3s ease}
.admin-bar.show{display:flex}
.btn-add{padding:9px 16px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:none;display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,#7c6dff,#5b4dcc);color:#fff;transition:all .2s}
.btn-add:active{opacity:.85;transform:scale(.97)}
.admin-info{padding:9px 13px;border-radius:10px;background:#1c1c24;border:1px solid rgba(255,255,255,.1);font-size:12px;color:#9090a8;display:flex;align-items:center;gap:4px}
.btn-exit-admin{padding:9px 13px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#ef4444}

/* ── FILTERS ── */
.filters{padding:0 16px 12px;max-width:760px;margin:0 auto;display:flex;gap:7px;flex-wrap:wrap;align-items:center}
/* BIGGER category chips */
.chip{padding:7px 16px;border-radius:20px;background:#16161c;border:1px solid rgba(255,255,255,.07);color:#9090a8;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.chip.active{background:rgba(124,109,255,.15);border-color:rgba(124,109,255,.4);color:#a78bfa}
.search-wrap{display:flex;align-items:center;gap:6px;background:#16161c;border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:7px 13px;margin-left:auto}
.search-wrap input{background:none;border:none;outline:none;font-size:12px;color:#f0f0f5;width:110px;font-family:inherit}
.search-wrap input::placeholder{color:#3a3a52}

/* ── GRID ── */
.grid{padding:0 16px 120px;max-width:760px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:#5a5a70}

/* ── CARD ── */
.card{background:#16161c;border:1px solid rgba(255,255,255,.07);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .25s,border-color .25s,box-shadow .25s;position:relative;animation:fadeUp .35s ease both}
.card:active{transform:scale(.97)}
@media(hover:hover){.card:hover{transform:translateY(-4px);border-color:rgba(255,255,255,.15);box-shadow:0 18px 48px rgba(0,0,0,.5)}}
.card-img{width:100%;aspect-ratio:1;background:#131318;display:flex;align-items:center;justify-content:center;font-size:48px;position:relative;overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:contain;position:absolute;inset:0;padding:4px}
.card-badge{position:absolute;top:8px;left:8px;color:#fff;font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px;letter-spacing:.06em;backdrop-filter:blur(8px)}
.card-badge.new{background:rgba(34,197,94,.85)}.card-badge.sale{background:rgba(239,68,68,.85)}.card-badge.hot{background:rgba(124,109,255,.85)}
.card-admin{position:absolute;top:8px;right:8px;display:flex;flex-direction:column;gap:4px}
.admin-btn{width:28px;height:28px;border-radius:8px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px}
.admin-btn.edit{background:rgba(124,109,255,.9)}.admin-btn.del{background:rgba(239,68,68,.9)}
.card-info{padding:12px}
.card-name{font-size:13px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-cat{font-size:10px;color:#5a5a70;text-transform:uppercase;letter-spacing:.07em;margin-bottom:9px}
.card-foot{display:flex;align-items:center;justify-content:space-between}
.card-price{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:700}
.card-price .old{font-size:10px;color:#5a5a70;text-decoration:line-through;margin-right:3px;font-family:'Inter',sans-serif;font-weight:400}
.add-btn{width:30px;height:30px;border-radius:9px;background:rgba(124,109,255,.12);border:1px solid rgba(124,109,255,.25);color:#a78bfa;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0}
.add-btn.in{background:rgba(34,197,94,.18);border-color:rgba(34,197,94,.4);color:#22c55e}
.add-btn:active{transform:scale(.88)}

/* ── CART ── */
.page-inner{padding:22px 16px 120px;max-width:660px;margin:0 auto}
.page-head{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.back-btn{width:32px;height:32px;border-radius:9px;background:#16161c;border:1px solid rgba(255,255,255,.09);color:#9090a8;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.page-title{font-family:'Unbounded',sans-serif;font-size:17px;font-weight:700}
.cart-items{display:flex;flex-direction:column;gap:9px;margin-bottom:16px}
.cart-item{background:#16161c;border:1px solid rgba(255,255,255,.07);border-radius:13px;padding:11px 13px;display:flex;align-items:center;gap:12px}
.cart-thumb{width:52px;height:52px;border-radius:10px;background:#131318;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden}
.cart-thumb img{width:100%;height:100%;object-fit:contain;padding:2px}
.cart-info{flex:1;min-width:0}
.cart-name{font-size:13px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-cat{font-size:11px;color:#5a5a70}
.cart-price{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:700;margin-right:8px;white-space:nowrap}
.cart-rm{width:26px;height:26px;border-radius:7px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#ef4444;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cart-summary{background:#16161c;border:1px solid rgba(255,255,255,.07);border-radius:15px;padding:18px}
.sum-row{display:flex;justify-content:space-between;font-size:13px;color:#9090a8;margin-bottom:7px}
.sum-row.main{font-size:16px;font-weight:700;color:#f0f0f5;border-top:1px solid rgba(255,255,255,.07);padding-top:11px;margin-top:4px;margin-bottom:0}
.sum-row.main .val{font-family:'Unbounded',sans-serif}
.btn-checkout{width:100%;margin-top:14px;padding:13px;background:linear-gradient(135deg,#229ED9,#1a7fc1);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;font-family:'Inter',sans-serif}
.btn-checkout:active{opacity:.85;transform:scale(.98)}
.checkout-hint{font-size:11px;color:#5a5a70;text-align:center;margin-top:8px;line-height:1.5}

/* ── PROFILE ── */
.profile-hero{background:linear-gradient(135deg,#16161c,#1c1c24);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:22px;margin-bottom:14px;display:flex;align-items:center;gap:16px;position:relative;overflow:hidden}
.profile-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(124,109,255,.08) 0%,transparent 70%);pointer-events:none}
.profile-avatar{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#7c6dff,#5b4dcc);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#fff;font-family:'Unbounded',sans-serif;flex-shrink:0;overflow:hidden;border:2px solid rgba(124,109,255,.3)}
.profile-avatar img{width:100%;height:100%;object-fit:cover}
.profile-name{font-family:'Unbounded',sans-serif;font-size:17px;font-weight:700;margin-bottom:5px}
.profile-role{display:inline-flex;align-items:center;gap:4px;background:rgba(124,109,255,.15);border:1px solid rgba(124,109,255,.3);padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;color:#a78bfa}
.profile-role.admin{background:rgba(245,200,66,.1);border-color:rgba(245,200,66,.3);color:#f5c842}
.profile-handle{font-size:12px;color:#9090a8;margin-top:5px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat-card{background:#16161c;border:1px solid rgba(255,255,255,.07);border-radius:13px;padding:14px;text-align:center}
.stat-val{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:700;margin-top:4px}
.stat-lbl{font-size:10px;color:#5a5a70;margin-top:2px;text-transform:uppercase;letter-spacing:.06em}
.profile-section{background:#16161c;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:16px;margin-bottom:12px}
.sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#9090a8;margin-bottom:12px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.info-row:last-child{border-bottom:none}
.info-key{font-size:13px;color:#9090a8}
.info-val{font-size:13px;font-weight:600}
.btn-danger-full{width:100%;padding:11px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.28);border-radius:11px;color:#ef4444;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.84);backdrop-filter:blur(12px);z-index:100;display:none;align-items:flex-end;justify-content:center}
.overlay.active{display:flex}
.modal{background:#16161c;border:1px solid rgba(255,255,255,.12);border-radius:20px 20px 0 0;padding:20px 18px 36px;width:100%;max-height:92vh;overflow-y:auto;animation:mIn .28s cubic-bezier(.25,.46,.45,.94);position:relative}
.modal-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.15);margin:0 auto 16px}
.modal-close{position:absolute;top:16px;right:15px;width:28px;height:28px;border-radius:8px;background:#131318;border:1px solid rgba(255,255,255,.07);color:#9090a8;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-title{font-family:'Unbounded',sans-serif;font-weight:700;font-size:16px;margin-bottom:4px}
.modal-sub{font-size:12px;color:#9090a8;margin-bottom:18px}

/* ── DETAIL ── */
/* Photo gallery */
.gallery{width:100%;position:relative;margin-bottom:14px;border-radius:14px;overflow:hidden;background:#131318}
.gallery-main{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:64px;overflow:hidden}
.gallery-main img{width:100%;height:100%;object-fit:contain}
.gallery-thumbs{display:flex;gap:7px;padding:8px;overflow-x:auto;scrollbar-width:none}
.gallery-thumbs::-webkit-scrollbar{display:none}
.gallery-thumb{width:54px;height:54px;border-radius:8px;background:#1c1c24;border:2px solid transparent;cursor:pointer;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:20px;transition:border-color .2s}
.gallery-thumb.active{border-color:#7c6dff}
.gallery-thumb img{width:100%;height:100%;object-fit:contain}
.detail-name{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:700;margin-bottom:4px}
.detail-cat{font-size:11px;color:#5a5a70;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.detail-meta{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.meta-tag{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);padding:2px 8px;border-radius:5px;font-size:11px;color:#9090a8}
.detail-price{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:900;margin-bottom:12px}
.detail-price .old{font-size:13px;color:#5a5a70;text-decoration:line-through;margin-right:7px;font-family:'Inter',sans-serif;font-weight:400}
/* Описание с переносами строк */
.detail-desc{font-size:13px;color:#9090a8;line-height:1.75;margin-bottom:14px;white-space:pre-wrap;word-break:break-word}
.sizes-label{font-size:10px;font-weight:600;color:#9090a8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.detail-sizes{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px}
.detail-size{padding:4px 10px;border-radius:7px;border:1px solid rgba(255,255,255,.11);background:#131318;font-size:12px;font-weight:600;color:#9090a8}

/* ── FORMS ── */
.form-group{margin-bottom:13px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px}
label.lbl{font-size:10px;font-weight:600;color:#9090a8;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px}
.inp{width:100%;padding:10px 12px;background:#0d0d10;border:1px solid rgba(255,255,255,.11);border-radius:9px;color:#f0f0f5;font-size:14px;outline:none;font-family:'Inter',sans-serif;transition:border-color .2s}
.inp:focus{border-color:#7c6dff;box-shadow:0 0 0 3px rgba(124,109,255,.1)}
.inp::placeholder{color:#3a3a52}
textarea.inp{resize:vertical;min-height:80px;white-space:pre-wrap}
select.inp{cursor:pointer}

/* Photos upload multi */
.photos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.photo-slot{aspect-ratio:1;border-radius:10px;background:#131318;border:2px dashed rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;transition:all .2s}
.photo-slot:hover{border-color:rgba(124,109,255,.4)}
.photo-slot.filled{border-style:solid;border-color:rgba(255,255,255,.1)}
.photo-slot img{width:100%;height:100%;object-fit:contain;padding:2px}
.photo-slot .add-icon{font-size:22px;color:#5a5a70}
.photo-rm{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:4px;background:rgba(239,68,68,.85);border:none;color:#fff;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.photos-hint{font-size:11px;color:#5a5a70;text-align:center;margin-bottom:14px}

.sizes-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.sz-chip{padding:5px 11px;border-radius:7px;border:1px solid rgba(255,255,255,.11);background:#0d0d10;color:#9090a8;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s}
.sz-chip.active{border-color:#7c6dff;background:rgba(124,109,255,.2);color:#a78bfa}

.btn-primary{width:100%;padding:12px;background:linear-gradient(135deg,#7c6dff,#5b4dcc);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s}
.btn-primary:active{opacity:.85;transform:scale(.98)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-secondary{width:100%;padding:11px;background:#131318;border:1px solid rgba(255,255,255,.09);border-radius:12px;color:#f0f0f5;font-size:13px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;margin-top:8px}
.btn-danger{width:100%;padding:11px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.28);border-radius:12px;color:#ef4444;font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}

/* PIN */
.pin-wrap{text-align:center;padding:6px 0}
.pin-icon{font-size:36px;margin-bottom:12px}
.pin-input{width:100%;padding:13px;background:#0d0d10;border:1px solid rgba(255,255,255,.11);border-radius:12px;color:#f0f0f5;font-size:18px;letter-spacing:.15em;text-align:center;outline:none;font-family:'Inter',sans-serif;margin-bottom:5px}
.pin-input:focus{border-color:#7c6dff}
.pin-input.shake{animation:shake .4s ease;border-color:#ef4444}
.pin-error{font-size:12px;color:#ef4444;margin-bottom:12px;min-height:18px}

/* TOAST */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(18,18,24,.97);border:1px solid rgba(255,255,255,.11);border-radius:10px;padding:9px 18px;font-size:13px;font-weight:500;z-index:200;backdrop-filter:blur(14px);white-space:nowrap;animation:tIn .3s ease;pointer-events:none;display:none}
.toast.show{display:block}

/* LOADER */
.loader{position:fixed;inset:0;background:#060608;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.loader.hide{display:none}
.spinner{width:36px;height:36px;border:3px solid rgba(124,109,255,.2);border-top-color:#7c6dff;border-radius:50%;animation:spin 0.8s linear infinite}
.loader-text{font-size:13px;color:#9090a8}

/* SYNC */
.sync-bar{position:fixed;top:62px;right:12px;z-index:40;background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);border-radius:8px;padding:4px 10px;font-size:11px;color:#22c55e;display:none;align-items:center;gap:5px}
.sync-bar.show{display:flex}
.sync-dot{width:5px;height:5px;border-radius:50%;background:#22c55e;animation:pulse 1.5s infinite}
</style>
</head>

// ══ IMGBB ══
async function uploadToImgBB(base64){
  try{
    const b64 = base64.includes(',') ? base64.split(',')[1] : base64;
    const fd = new FormData();
    fd.append('key', IMGBB_KEY);
    fd.append('image', b64);
    const r = await fetch('https://api.imgbb.com/1/upload',{method:'POST',body:fd});
    const j = await r.json();
    return j.success ? j.data.url : null;
  }catch{ return null; }
}

// ══ JSONBIN ══
async function cloudLoad(){
  try{
    const r = await fetch(BIN_URL+"/latest",{headers:{"X-Master-Key":MASTER_KEY,"X-Bin-Meta":"false"}});
    if(!r.ok) return false;
    const raw = await r.json();
    let data = (raw&&raw.record!==undefined) ? raw.record : raw;
    if(Array.isArray(data)){
      const valid = data.filter(p=>p&&p.id&&p.name);
      if(valid.length>0){ products=valid; return true; }
    }
    return false;
  }catch{ return false; }
}
async function cloudSave(){
  try{
    const r = await fetch(BIN_URL,{
      method:"PUT",
      headers:{"Content-Type":"application/json","X-Master-Key":MASTER_KEY,"X-Access-Key":ACCESS_KEY},
      body:JSON.stringify(products)
    });
    if(r.ok){ lsSave(); showSync(); return true; }
    return false;
  }catch{ return false; }
}
function lsSave(){ try{ localStorage.setItem("hs_products",JSON.stringify(products)); }catch{} }
function lsLoad(){
  try{
    const raw=localStorage.getItem("hs_products");
    if(!raw) return false;
    const p=JSON.parse(raw);
    if(Array.isArray(p)&&p.length>0){
      const valid=p.filter(x=>x&&x.id&&x.name);
      if(valid.length>0){ products=valid; return true; }
    }
  }catch{}
  return false;
}
function cartSave(){ try{ localStorage.setItem("hs_cart",JSON.stringify(cart)); }catch{} }

// ══ LOGO 5x ══

  logoClickCount++;

// ══ FILTERS ══
function renderFilters(){
  const cats=["all",...new Set(products.map(p=>p.cat).filter(Boolean))];

}
function setFilter(c){currentFilter=c;renderFilters();renderGrid();}
function setSearch(q){searchQ=q;renderGrid();}

// ══ GRID ══
function renderGrid(){
  const filtered=products.filter(p=>{
    if(!p||!p.id||!p.name) return false;
    const mc=currentFilter==="all"||p.cat===currentFilter;
    const q=searchQ.toLowerCase();
    return mc&&(!q||p.name.toLowerCase().includes(q)||(p.cat||"").toLowerCase().includes(q));
  });
  const grid=document.getElementById("grid");
  if(!filtered.length){
    grid.innerHTML=`<div class="empty"><div style="font-size:42px;margin-bottom:10px">📦</div><p style="font-size:14px;color:#9090a8">Товаров не найдено</p></div>`;
    return;
  }
  grid.innerHTML=filtered.map((p,i)=>{
    const inC=cart.some(c=>c.id===p.id);
    const imgs=p.imgs&&p.imgs.length?p.imgs:(p.img?[p.img]:[]);
    const imgHtml=imgs[0]?`<img src="${imgs[0]}" alt="${p.name}" loading="lazy">`:`<span style="position:relative;z-index:1">${p.emoji||"📦"}</span>`;
    const badgeHtml=p.badge?`<div class="card-badge ${p.badge}">${p.badge.toUpperCase()}</div>`:"";
    const adminHtml=isAdmin?`<div class="card-admin"><button class="admin-btn edit" onclick="openEditProduct(${p.id},event)">✏️</button><button class="admin-btn del" onclick="openDeleteProduct(${p.id},event)">🗑️</button></div>`:"";

    return `<div class="card" style="animation-delay:${i*0.05}s" onclick="openDetail(${p.id})">

        <div class="card-name">${p.name}</div>
        <div class="card-cat">${p.cat||""}</div>

        </div>
      </div>

  }).join("");

// ══ CART ══
function toggleCart(id,e){
  e?.stopPropagation();
  const idx=cart.findIndex(c=>c.id===id);
  if(idx>=0){cart.splice(idx,1);showToast("Убрано из корзины");}
  else{const p=products.find(x=>x.id===id);if(p){cart.push({...p});showToast("✓ Добавлено в корзину");animCart();}}
  cartSave();updateCartBubble();renderGrid();
}
function animCart(){
  const b=document.getElementById("cart-bubble");
  b.classList.remove("pop");void b.offsetWidth;b.classList.add("pop");
  setTimeout(()=>b.classList.remove("pop"),400);
}
function updateCartBubble(){
  document.getElementById("cart-num").textContent=cart.length;
  document.getElementById("cart-bubble").style.display=cart.length>0?"flex":"none";
}

      Написать продавцу в Telegram
    </button>
    <div class="checkout-hint">Уточните размер и детали напрямую у продавца</div>
  </div>`;
}

    ?`<img id="gallery-main-img" src="${imgs[0]}" alt="" style="width:100%;height:100%;object-fit:contain">`
    :`<span style="font-size:64px">${p.emoji||"📦"}</span>`;

  const thumbsHtml=imgs.length>1?`
    <div class="gallery-thumbs" id="gallery-thumbs">
      ${imgs.map((url,i)=>`
        <div class="gallery-thumb${i===0?" active":""}" onclick="switchPhoto(${i})" data-idx="${i}">
          <img src="${url}" alt="">
        </div>`).join("")}
    </div>`:
    (imgs.length===1?"":`<div class="gallery-thumbs"></div>`);

  const oldHtml=p.oldPrice?`<span class="old">${p.oldPrice.toLocaleString()}₽</span>`:"";
  const sizesHtml=p.sizes?.length?`<div class="sizes-label">Размеры</div><div class="detail-sizes">${p.sizes.map(s=>`<div class="detail-size">${s}</div>`).join("")}</div>`:"";

  document.getElementById("modal-body").innerHTML=`
    <div class="gallery">
      <div class="gallery-main" id="gallery-main">${mainContent}</div>
      ${thumbsHtml}
    </div>
    <div class="detail-name">${p.name}</div>
    <div class="detail-cat">${p.cat}</div>
    <div class="detail-meta">
      <span class="meta-tag">👁 ${p.views} просм.</span>
      ${imgs.length>1?`<span class="meta-tag">📷 ${imgs.length} фото</span>`:""}
      ${p.badge?`<span class="meta-tag">${p.badge.toUpperCase()}</span>`:""}
    </div>
    <div class="detail-price">${oldHtml}${p.price.toLocaleString()}₽</div>
    ${p.desc?`<div class="detail-desc">${p.desc}</div>`:""}
    ${sizesHtml}
    <button class="btn-primary" style="${inC?'background:linear-gradient(135deg,#22c55e,#16a34a)':''}" onclick="toggleCart(${p.id});closeModal()">
      ${inC?"✓ Убрать из корзины":"🛒 Добавить в корзину"}
    </button>`;
  openModal();
}

function switchPhoto(idx){
  const p=products.find(x=>x.id); // get current detail product
  const mainEl=document.getElementById("gallery-main");
  const thumbs=document.querySelectorAll(".gallery-thumb");
  thumbs.forEach((t,i)=>t.classList.toggle("active",i===idx));
  const imgEl=document.getElementById("gallery-main-img");
  // find current imgs from modal context
  const allThumbs=document.querySelectorAll(".gallery-thumb");
  if(allThumbs[idx]){
    const src=allThumbs[idx].querySelector("img")?.src;
    if(imgEl&&src) imgEl.src=src;
  }
  currentDetailPhotoIdx=idx;
}

// ══ PRODUCT FORM with multi-photo ══
function openAddProduct(){editingId=null;selectedSizes=[];selectedPhotos=[];renderProductForm();}
function openEditProduct(id,e){
  e?.stopPropagation();
  const p=products.find(x=>x.id===id);if(!p)return;
  editingId=id;
  selectedSizes=[...(p.sizes||[])];
  // migrate: old single img → imgs array
  const imgs=p.imgs&&p.imgs.length?[...p.imgs]:(p.img?[p.img]:[]);
  selectedPhotos=imgs.map(url=>({url,isNew:false}));
  renderProductForm(p);
}
function openDeleteProduct(id,e){
  e?.stopPropagation();deletingId=id;
  const p=products.find(x=>x.id===id);
  document.getElementById("modal-body").innerHTML=`
    <div class="modal-title">Удалить товар?</div>
    <div class="modal-sub">«${p?.name}» — это нельзя отменить.</div>
    <button class="btn-danger" onclick="confirmDelete()">Удалить</button>
    <button class="btn-secondary" onclick="closeModal()">Отмена</button>`;
  openModal();
}
async function confirmDelete(){
  products=products.filter(p=>String(p.id)!==String(deletingId));
  cart=cart.filter(c=>String(c.id)!==String(deletingId));
  cartSave();closeModal();renderGrid();renderFilters();
  showToast("🗑️ Удаляем...");
  await cloudSave();
  showToast("🗑️ Товар удалён!");
}

function renderProductForm(p){
  document.getElementById("modal-body").innerHTML=`
    <div class="modal-title">${editingId?"Редактировать":"Добавить товар"}</div>
    <div class="modal-sub">До ${MAX_PHOTOS} фото на товар</div>

    <div class="photos-grid" id="photos-grid"></div>
    <div class="photos-hint" id="photos-hint"></div>
    <input type="file" id="file-inp" accept="image/*" style="display:none" onchange="handleFileSelect(this)">

    <div class="form-row">
      <div><label class="lbl">Название</label><input class="inp" id="pName" placeholder="Название" value="${p?.name||""}"></div>
      <div><label class="lbl">Категория</label><input class="inp" id="pCat" placeholder="Худи, Кроссовки..." value="${p?.cat||""}"></div>
    </div>
    <div class="form-group">
      <label class="lbl">Описание (Enter = новая строка)</label>
      <textarea class="inp" id="pDesc" placeholder="Пишите как хотите — переносы строк сохранятся">${p?.desc||""}</textarea>
    </div>
    <div class="form-row">
      <div><label class="lbl">Цена (₽)</label><input class="inp" type="number" id="pPrice" placeholder="0" value="${p?.price||""}"></div>
      <div><label class="lbl">Старая цена</label><input class="inp" type="number" id="pOld" placeholder="—" value="${p?.oldPrice||""}"></div>
    </div>
    <div class="form-group"><label class="lbl">Размеры</label>
      <div class="sizes-wrap">${["XS","S","M","L","XL","XXL","One Size"].map(s=>`<button class="sz-chip${selectedSizes.includes(s)?" active":""}" onclick="toggleSize('${s}',this)">${s}</button>`).join("")}</div>
    </div>
    <div class="form-group"><label class="lbl">Метка</label>
      <select class="inp" id="pBadge">
        <option value="" ${!p?.badge?"selected":""}>Без метки</option>
        <option value="new" ${p?.badge==="new"?"selected":""}>NEW</option>
        <option value="sale" ${p?.badge==="sale"?"selected":""}>SALE</option>
        <option value="hot" ${p?.badge==="hot"?"selected":""}>HOT</option>
      </select>
    </div>
    <button class="btn-primary" id="save-btn" onclick="saveProduct()">${editingId?"Сохранить изменения":"Добавить товар"}</button>
    <button class="btn-secondary" onclick="closeModal()">Отмена</button>`;
  openModal();
  renderPhotoSlots();
}

function renderPhotoSlots(){
  const grid=document.getElementById("photos-grid");
  const hint=document.getElementById("photos-hint");
  if(!grid) return;
  const slots=[];
  for(let i=0;i<MAX_PHOTOS;i++){
    const photo=selectedPhotos[i];
    if(photo){
      slots.push(`<div class="photo-slot filled">
        <img src="${photo.url}" alt="">
        <button class="photo-rm" onclick="removePhoto(${i})">✕</button>
      </div>`);
    } else if(i===selectedPhotos.length && selectedPhotos.length<MAX_PHOTOS){
      slots.push(`<div class="photo-slot" onclick="document.getElementById('file-inp').click()">
        <span class="add-icon">＋</span>
      </div>`);
      break;
    } else if(i<selectedPhotos.length){
      continue;
    } else break;
  }
  grid.innerHTML=slots.join("");
  if(hint) hint.textContent=`${selectedPhotos.length}/${MAX_PHOTOS} фото`;
}

function removePhoto(idx){
  selectedPhotos.splice(idx,1);
  renderPhotoSlots();
}

function handleFileSelect(input){
  const file=input.files[0];
  if(!file) return;
  input.value="";
  if(!file.type.startsWith("image/")){showToast("⚠️ Только изображения");return;}
  if(file.size>10*1024*1024){showToast("⚠️ Файл больше 10MB");return;}
  if(selectedPhotos.length>=MAX_PHOTOS){showToast("⚠️ Максимум "+MAX_PHOTOS+" фото");return;}
  const reader=new FileReader();
  reader.onload=e=>{
    selectedPhotos.push({url:e.target.result,isNew:true,base64:e.target.result});
    renderPhotoSlots();
    showToast("📷 Фото добавлено");
  };
  reader.readAsDataURL(file);
}

function toggleSize(s,btn){
  if(selectedSizes.includes(s)) selectedSizes=selectedSizes.filter(x=>x!==s);
  else selectedSizes.push(s);
  btn.classList.toggle("active",selectedSizes.includes(s));
}

async function saveProduct(){
  const name=(document.getElementById("pName")?.value||"").trim();
  const cat=(document.getElementById("pCat")?.value||"").trim();
  const price=parseInt(document.getElementById("pPrice")?.value||"0");
  if(!name||!cat||!price){showToast("⚠️ Название, категория и цена обязательны");return;}
  const btn=document.getElementById("save-btn");
  if(btn) btn.disabled=true;
  const oldPrice=parseInt(document.getElementById("pOld")?.value||"0")||null;
  const desc=document.getElementById("pDesc")?.value||"";
  const badge=document.getElementById("pBadge")?.value||"";
  const emojis={"Худи":"🧥","Футболки":"👕","Брюки":"👖","Аксессуары":"🧢","Куртки":"🫸","Обувь":"👟","Кроссовки":"👟","Кепки":"🧢","Штаны":"👖"};

  // Upload new photos to ImgBB
  const newPhotos=selectedPhotos.filter(p=>p.isNew);
  if(newPhotos.length>0){
    showToast(`📤 Загружаем ${newPhotos.length} фото...`);
    for(let i=0;i<selectedPhotos.length;i++){
      if(selectedPhotos[i].isNew){
        const url=await uploadToImgBB(selectedPhotos[i].base64);
        if(url){ selectedPhotos[i]={url,isNew:false}; }
        else { selectedPhotos[i]={url:"",isNew:false}; }
      }
    }
  }
  const finalImgs=selectedPhotos.map(p=>p.url).filter(Boolean);

  const item={
    id:editingId||Date.now(),
    name,cat,price,oldPrice,
    desc, // сохраняем как есть с переносами строк
    badge,sizes:selectedSizes,
    imgs:finalImgs,
    img:finalImgs[0]||"", // обратная совместимость
    emoji:emojis[cat]||"📦",
    views:editingId?(products.find(x=>x.id===editingId)?.views||0):0
  };
  if(editingId) products=products.map(p=>String(p.id)===String(editingId)?item:p);
  else products.push(item);
  closeModal();renderGrid();renderFilters();
  showToast("💾 Сохраняем в облако...");
  const ok=await cloudSave();
  if(btn) btn.disabled=false;
  if(ok) showToast(editingId?"✏️ Обновлено — видно всем!":"✓ Добавлено — видно всем!");
  else{ lsSave(); showToast("❌ Ошибка облака — сохранено локально"); }
}

function openModal(){document.getElementById("overlay").classList.add("active");document.body.style.overflow="hidden";}
function closeModal(){document.getElementById("overlay").classList.remove("active");document.body.style.overflow="";}
function overlayClick(e){if(e.target===document.getElementById("overlay"))closeModal();}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});

// ══ INIT ══
async function init(){
  cartLoad();
  // Сначала облако
  const cloudOk=await cloudLoad();
  if(!cloudOk){
    const lsOk=lsLoad();
    if(!lsOk){
      products=JSON.parse(JSON.stringify(DEMO));
      await cloudSave();
    }
  }
  document.getElementById("loader").classList.add("hide");
  renderFilters();
  renderGrid();
  updateCartBubble();
  // Профиль из TG
  const navBtn=document.getElementById("nav-profile-btn");
  if(tgUser){
    if(tgUser.photo_url) navBtn.innerHTML=`<img src="${tgUser.photo_url}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
    else navBtn.textContent=(tgUser.first_name||"?")[0].toUpperCase();
  }
}
init();
</script>
