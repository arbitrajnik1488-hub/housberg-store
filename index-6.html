<html lang="ru">
<head>
<meta charset="UTF-8">

<title>HOUSBERG STORE</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{font-family:'Inter',sans-serif;background:#060608;color:#f0f0f5;min-height:100vh;overscroll-behavior:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#5b4dcc;border-radius:2px}
img{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
@keyframes mIn{from{opacity:0;transform:scale(.88) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes tIn{from{opacity:0;transform:translateY(10px) translateX(-50%)}to{opacity:1;transform:translateY(0) translateX(-50%)}}
@keyframes cPop{0%{transform:scale(1)}45%{transform:scale(1.45)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes adminIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.orb{position:fixed;border-radius:50%;filter:blur(110px);pointer-events:none;z-index:0}
.orb1{width:400px;height:400px;background:rgba(124,109,255,.06);top:-120px;left:-120px}
.orb2{width:320px;height:320px;background:rgba(167,139,250,.04);bottom:-90px;right:-90px}
.nav{position:sticky;top:0;z-index:50;background:rgba(6,6,8,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.07);padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Unbounded',sans-serif;font-weight:900;font-size:14px;letter-spacing:.1em;background:linear-gradient(135deg,#fff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;cursor:pointer;user-select:none;-webkit-user-select:none;transition:transform .15s}
.logo:active{transform:scale(.92)}
.logo-dots{display:flex;gap:3px;margin-top:4px;justify-content:center}
.logo-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.15);transition:background .2s}
.logo-dot.active{background:#7c6dff}
.nav-right{display:flex;gap:6px;align-items:center}
.admin-badge{padding:4px 9px;border-radius:7px;background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.25);color:#f5c842;font-size:11px;font-weight:700;animation:adminIn .3s ease;display:flex;align-items:center;gap:4px}
.cart-bubble{width:36px;height:36px;border-radius:50%;background:#7c6dff;border:2px solid rgba(167,139,250,.4);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;box-shadow:0 0 16px rgba(124,109,255,.45);font-size:15px;flex-shrink:0}
.cart-bubble:active{transform:scale(.92)}
.cart-bubble.pop{animation:cPop .35s ease}
.cart-num{position:absolute;top:-5px;right:-5px;background:#ef4444;color:#fff;font-size:9px;font-weight:800;min-width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #060608;padding:0 2px;line-height:1}
.page{display:none;min-height:calc(100vh - 54px);position:relative;z-index:1}
.page.active{display:block}
.hero{padding:34px 16px 18px;max-width:760px;margin:0 auto}
.hero-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(124,109,255,.1);border:1px solid rgba(124,109,255,.2);padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;color:#a78bfa;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
.hero-badge span{width:5px;height:5px;border-radius:50%;background:#7c6dff;animation:pulse 2s infinite;display:inline-block}
.hero h1{font-family:'Unbounded',sans-serif;font-weight:900;font-size:clamp(22px,6vw,42px);line-height:1.1;margin-bottom:8px}
.hero-accent{background:linear-gradient(135deg,#7c6dff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{font-size:13px;color:#9090a8;line-height:1.65}
.admin-bar{padding:0 16px 14px;max-width:760px;margin:0 auto;display:none;gap:8px;flex-wrap:wrap;animation:adminIn .3s ease}
.admin-bar.show{display:flex}
.btn-add{padding:8px 16px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:none;display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,#7c6dff,#5b4dcc);color:#fff}
.btn-add:active{opacity:.85;transform:scale(.97)}
.admin-info{padding:8px 13px;border-radius:10px;background:#1c1c24;border:1px solid rgba(255,255,255,.1);font-size:12px;color:#9090a8;display:flex;align-items:center;gap:4px}
.btn-exit-admin{padding:8px 13px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#ef4444}
.filters{padding:0 16px 14px;max-width:760px;margin:0 auto;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.chip{padding:4px 12px;border-radius:18px;background:#16161c;border:1px solid rgba(255,255,255,.07);color:#9090a8;font-size:11px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap}
.chip.active{background:rgba(124,109,255,.15);border-color:rgba(124,109,255,.4);color:#a78bfa}
.search-wrap{display:flex;align-items:center;gap:6px;background:#16161c;border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:5px 11px;margin-left:auto}
.search-wrap input{background:none;border:none;outline:none;font-size:12px;color:#f0f0f5;width:110px;font-family:inherit}
.search-wrap input::placeholder{color:#3a3a52}
.grid{padding:0 16px 80px;max-width:760px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:#5a5a70}
.card{background:#16161c;border:1px solid rgba(255,255,255,.07);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .25s,border-color .25s,box-shadow .25s;position:relative;animation:fadeUp .35s ease both}

.card-img{width:100%;aspect-ratio:1;background:#131318;display:flex;align-items:center;justify-content:center;font-size:52px;position:relative;overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.card-badge{position:absolute;top:8px;left:8px;color:#fff;font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px;letter-spacing:.06em;backdrop-filter:blur(8px)}
.card-badge.new{background:rgba(34,197,94,.85)}.card-badge.sale{background:rgba(239,68,68,.85)}.card-badge.hot{background:rgba(124,109,255,.85)}
.card-admin{position:absolute;top:8px;right:8px;display:flex;flex-direction:column;gap:4px}
.admin-btn{width:28px;height:28px;border-radius:8px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px}
.admin-btn.edit{background:rgba(124,109,255,.9)}.admin-btn.del{background:rgba(239,68,68,.9)}
.card-info{padding:12px}
.card-name{font-size:13px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-cat{font-size:10px;color:#5a5a70;text-transform:uppercase;letter-spacing:.07em;margin-bottom:9px}
.card-foot{display:flex;align-items:center;justify-content:space-between}
.card-price{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:700}
.card-price .old{font-size:10px;color:#5a5a70;text-decoration:line-through;margin-right:3px;font-family:'Inter',sans-serif;font-weight:400}
.add-btn{width:30px;height:30px;border-radius:9px;background:rgba(124,109,255,.12);border:1px solid rgba(124,109,255,.25);color:#a78bfa;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0}
.add-btn.in{background:rgba(34,197,94,.18);border-color:rgba(34,197,94,.4);color:#22c55e}
.add-btn:active{transform:scale(.88)}
.page-inner{padding:22px 16px 80px;max-width:660px;margin:0 auto}
.page-head{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.back-btn{width:32px;height:32px;border-radius:9px;background:#16161c;border:1px solid rgba(255,255,255,.09);color:#9090a8;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.page-title{font-family:'Unbounded',sans-serif;font-size:17px;font-weight:700}
.cart-empty{text-align:center;padding:56px 20px;color:#5a5a70}
.cart-items{display:flex;flex-direction:column;gap:9px;margin-bottom:16px}
.cart-item{background:#16161c;border:1px solid rgba(255,255,255,.07);border-radius:13px;padding:11px 13px;display:flex;align-items:center;gap:12px}
.cart-thumb{width:52px;height:52px;border-radius:10px;background:#131318;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden}
.cart-thumb img{width:100%;height:100%;object-fit:cover}
.cart-info{flex:1;min-width:0}
.cart-name{font-size:13px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-cat{font-size:11px;color:#5a5a70}
.cart-price{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:700;margin-right:8px;white-space:nowrap}
.cart-rm{width:26px;height:26px;border-radius:7px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#ef4444;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cart-summary{background:#16161c;border:1px solid rgba(255,255,255,.07);border-radius:15px;padding:18px}
.sum-row{display:flex;justify-content:space-between;font-size:13px;color:#9090a8;margin-bottom:7px}
.sum-row.main{font-size:16px;font-weight:700;color:#f0f0f5;border-top:1px solid rgba(255,255,255,.07);padding-top:11px;margin-top:4px;margin-bottom:0}
.sum-row.main .val{font-family:'Unbounded',sans-serif}
.btn-checkout{width:100%;margin-top:14px;padding:13px;background:linear-gradient(135deg,#229ED9,#1a7fc1);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;font-family:'Inter',sans-serif}
.btn-checkout:active{opacity:.85;transform:scale(.98)}
.checkout-hint{font-size:11px;color:#5a5a70;text-align:center;margin-top:8px;line-height:1.5}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.84);backdrop-filter:blur(12px);z-index:100;display:none;align-items:flex-end;justify-content:center}
.overlay.active{display:flex}
.modal{background:#16161c;border:1px solid rgba(255,255,255,.12);border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-height:92vh;overflow-y:auto;animation:mIn .28s cubic-bezier(.34,1.56,.64,1);position:relative}
.modal-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.15);margin:0 auto 18px}
.modal-close{position:absolute;top:18px;right:16px;width:28px;height:28px;border-radius:8px;background:#131318;border:1px solid rgba(255,255,255,.07);color:#9090a8;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-title{font-family:'Unbounded',sans-serif;font-weight:700;font-size:16px;margin-bottom:4px}
.modal-sub{font-size:12px;color:#9090a8;margin-bottom:20px}
.form-group{margin-bottom:13px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px}
label.lbl{font-size:10px;font-weight:600;color:#9090a8;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px}
.inp{width:100%;padding:10px 12px;background:#0d0d10;border:1px solid rgba(255,255,255,.11);border-radius:9px;color:#f0f0f5;font-size:14px;outline:none;font-family:'Inter',sans-serif;transition:border-color .2s}
.inp:focus{border-color:#7c6dff;box-shadow:0 0 0 3px rgba(124,109,255,.1)}
.inp::placeholder{color:#3a3a52}
textarea.inp{resize:vertical;min-height:70px}
select.inp{cursor:pointer}
.upload-zone{border:2px dashed rgba(255,255,255,.12);border-radius:12px;padding:20px;text-align:center;cursor:pointer;background:#131318;transition:all .2s;margin-bottom:14px;position:relative;overflow:hidden}
.upload-zone.drag{border-color:#7c6dff;background:rgba(124,109,255,.05)}
.upload-zone .uicon{font-size:28px;margin-bottom:6px}
.upload-zone .utext{font-size:12px;color:#9090a8}
.upload-zone .uhint{font-size:10px;color:#5a5a70;margin-top:3px}
.upload-preview{width:100%;max-height:180px;object-fit:cover;border-radius:9px;display:block}
.upload-clear{position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:6px;background:rgba(239,68,68,.8);border:none;color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sizes-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.sz-chip{padding:4px 10px;border-radius:7px;border:1px solid rgba(255,255,255,.11);background:#0d0d10;color:#9090a8;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s}
.sz-chip.active{border-color:#7c6dff;background:rgba(124,109,255,.2);color:#a78bfa}
.btn-primary{width:100%;padding:12px;background:linear-gradient(135deg,#7c6dff,#5b4dcc);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-primary:active{opacity:.85;transform:scale(.98)}
.btn-secondary{width:100%;padding:11px;background:#131318;border:1px solid rgba(255,255,255,.09);border-radius:12px;color:#f0f0f5;font-size:13px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;margin-top:8px}
.btn-danger{width:100%;padding:11px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.28);border-radius:12px;color:#ef4444;font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}
.pin-wrap{text-align:center;padding:8px 0}
.pin-icon{font-size:38px;margin-bottom:13px}
.pin-input{width:100%;padding:13px;background:#0d0d10;border:1px solid rgba(255,255,255,.11);border-radius:12px;color:#f0f0f5;font-size:18px;letter-spacing:.15em;text-align:center;outline:none;font-family:'Inter',sans-serif;margin-bottom:5px}
.pin-input:focus{border-color:#7c6dff}
.pin-input.shake{animation:shake .4s ease;border-color:#ef4444}
.pin-error{font-size:12px;color:#ef4444;margin-bottom:12px;min-height:18px}
.detail-img{width:100%;aspect-ratio:16/9;background:#131318;border-radius:12px;margin-bottom:14px;display:flex;align-items:center;justify-content:center;font-size:62px;overflow:hidden}
.detail-img img{width:100%;height:100%;object-fit:cover}
.detail-name{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:700;margin-bottom:4px}
.detail-cat{font-size:11px;color:#5a5a70;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.detail-meta{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}

.detail-price{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:900;margin-bottom:12px}
.detail-price .old{font-size:13px;color:#5a5a70;text-decoration:line-through;margin-right:7px;font-family:'Inter',sans-serif;font-weight:400}
.detail-desc{font-size:13px;color:#9090a8;line-height:1.7;margin-bottom:14px}
.sizes-label{font-size:10px;font-weight:600;color:#9090a8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.detail-sizes{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px}
.detail-size{padding:4px 10px;border-radius:7px;border:1px solid rgba(255,255,255,.11);background:#131318;font-size:12px;font-weight:600;color:#9090a8}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(18,18,24,.97);border:1px solid rgba(255,255,255,.11);border-radius:10px;padding:9px 18px;font-size:13px;font-weight:500;z-index:200;backdrop-filter:blur(14px);white-space:nowrap;animation:tIn .3s ease;pointer-events:none;display:none}
.toast.show{display:block}
.loader{position:fixed;inset:0;background:#060608;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.loader.hide{display:none}
.spinner{width:36px;height:36px;border:3px solid rgba(124,109,255,.2);border-top-color:#7c6dff;border-radius:50%;animation:spin 0.8s linear infinite}
.loader-text{font-size:13px;color:#9090a8}
.sync-bar{position:fixed;top:60px;right:12px;z-index:40;background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);border-radius:8px;padding:4px 10px;font-size:11px;color:#22c55e;display:none;align-items:center;gap:5px}
.sync-bar.show{display:flex}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:pulse 1.5s infinite}
</style>
</head>

  {id:3,name:"Cargo Pants",cat:"Брюки",price:5800,desc:"Карго-брюки с множеством карманов.",badge:"",sizes:["S","M","L","XL"],emoji:"👖",views:0},
  {id:4,name:"Beanie Wool",cat:"Аксессуары",price:1400,desc:"Шапка из шерстяной пряжи.",badge:"",sizes:["One Size"],emoji:"🧢",views:0},
  {id:5,name:"Coach Jacket",cat:"Куртки",price:7200,oldPrice:8900,desc:"Лёгкая куртка-тренер с подкладкой.",badge:"hot",sizes:["S","M","L","XL"],emoji:"🫸",views:0},
  {id:6,name:"Logo Zip Hoodie",cat:"Худи",price:4800,desc:"Толстовка на молнии с вышитым лого.",badge:"new",sizes:["M","L","XL","XXL"],emoji:"🧤",views:0},
];

const tg = window.Telegram?.WebApp;
if(tg){ tg.ready(); tg.expand(); tg.setHeaderColor('#060608'); }

let products=[], cart=[], isAdmin=false;
let logoClickCount=0, logoTimer=null;
let editingId=null, deletingId=null;
let selectedSizes=[], selectedImg=null;
let currentFilter="all", searchQ="";
let toastTimer=null;

// ── JSONBIN ──
async function loadFromCloud(){
  try{
    const r = await fetch(BIN_URL+"/latest", {headers:{"X-Master-Key":API_KEY,"X-Bin-Meta":"false"}});
    if(!r.ok) throw new Error();
    const raw = await r.json();
    // JSONBin returns {record:[...]} or just [...]
    let data = (raw && raw.record !== undefined) ? raw.record : raw;
    // Filter valid products only
    if(Array.isArray(data)){
      data = data.filter(p => p && typeof p === 'object' && p.id && p.name);
    }
    if(Array.isArray(data) && data.length > 0){
      products = data;
    } else {
      // Empty bin — seed with demo products
      products = JSON.parse(JSON.stringify(DEMO));
      await saveToCloud();
    }
  } catch(e){
    try{
      const p=localStorage.getItem("hs_products");
      const parsed = p ? JSON.parse(p) : null;
      products = (Array.isArray(parsed) && parsed.length > 0) ? parsed : JSON.parse(JSON.stringify(DEMO));
    } catch{ products = JSON.parse(JSON.stringify(DEMO)); }
  }
}

async function saveToCloud(){
  try{
    await fetch(BIN_URL, {
      method:"PUT",
      headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},
      body: JSON.stringify(products)
    });
    localStorage.setItem("hs_products", JSON.stringify(products));
    showSync();
  } catch{
    localStorage.setItem("hs_products", JSON.stringify(products));
    showToast("⚠️ Нет связи — сохранено локально");
  }
}

function showSync(){
  const el=document.getElementById("sync-bar");
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),2500);
}

function saveCart(){ try{localStorage.setItem("hs_cart",JSON.stringify(cart))}catch{} }
function loadCart(){ try{const c=localStorage.getItem("hs_cart");cart=c?JSON.parse(c):[]}catch{cart=[]} }

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),2400);
}

function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("page-"+id).classList.add("active");
  if(id==="cart") renderCart();
  window.scrollTo(0,0);
}

// ── LOGO 5x ──
function logoClick(){
  logoClickCount++;
  clearTimeout(logoTimer);
  const dots=document.getElementById("logo-dots");
  dots.style.display="flex";
  for(let i=0;i<5;i++) document.getElementById("d"+i).classList.toggle("active",i<logoClickCount);
  if(logoClickCount>=5){ logoClickCount=0; dots.style.display="none"; isAdmin?exitAdmin():openAdminLogin(); return; }
  logoTimer=setTimeout(()=>{logoClickCount=0;dots.style.display="none"},2000);
}

function openAdminLogin(){
  document.getElementById("modal-body").innerHTML=`
    <div class="pin-wrap">
      <div class="pin-icon">🔐</div>
      <div class="modal-title">Панель администратора</div>
      <div class="modal-sub">Введите пароль для доступа</div>
      <input class="pin-input" id="pin-input" type="password" placeholder="Пароль" autocomplete="off"
        oninput="pinErr(false)" onkeydown="if(event.key==='Enter')checkPin()">
      <div class="pin-error" id="pin-error"></div>
      <button class="btn-primary" onclick="checkPin()">Войти</button>
      <button class="btn-secondary" onclick="closeModal()">Отмена</button>
    </div>`;
  openModal();
  setTimeout(()=>document.getElementById("pin-input")?.focus(),300);
}

function pinErr(on){
  const el=document.getElementById("pin-error"),inp=document.getElementById("pin-input");
  if(on){el.textContent="Неверный пароль";inp.classList.add("shake");setTimeout(()=>inp.classList.remove("shake"),450)}
  else el.textContent="";
}
function checkPin(){
  const v=(document.getElementById("pin-input")?.value||"").trim();
  if(v===ADMIN_PASS){isAdmin=true;closeModal();activateAdmin()}else pinErr(true);
}
function activateAdmin(){
  document.getElementById("admin-badge").style.display="flex";
  document.getElementById("admin-bar").classList.add("show");
  updateAdminInfo();renderGrid();
  showToast("👑 Режим администратора активирован");
}
function exitAdmin(){
  isAdmin=false;
  document.getElementById("admin-badge").style.display="none";
  document.getElementById("admin-bar").classList.remove("show");
  renderGrid();showToast("Вышли из режима администратора");
}
function updateAdminInfo(){ document.getElementById("admin-info").textContent="📦 "+products.length+" товаров"; }

function renderFilters(){
  const cats=["all",...new Set(products.map(p=>p.cat).filter(Boolean))];
  document.getElementById("filters").innerHTML=cats.map(c=>`
    <button class="chip${c===currentFilter?" active":""}" onclick="setFilter('${c}')">${c==="all"?"Все":c}</button>
  `).join("")+`<div class="search-wrap"><span style="font-size:11px;color:#5a5a70">🔍</span><input placeholder="Поиск..." value="${searchQ}" oninput="setSearch(this.value)"></div>`;
}

function setFilter(c){currentFilter=c;renderFilters();renderGrid()}
function setSearch(q){searchQ=q;renderGrid()}

function renderGrid(){
  const filtered=products.filter(p=>{
    if(!p||!p.id||!p.name) return false;
    const mc=currentFilter==="all"||p.cat===currentFilter;
    const q=searchQ.toLowerCase();
    return mc&&(!q||p.name.toLowerCase().includes(q)||(p.cat||"").toLowerCase().includes(q));
  });
  const grid=document.getElementById("grid");
  if(!filtered.length){grid.innerHTML=`<div class="empty"><div style="font-size:42px;margin-bottom:10px">📦</div><p style="font-size:14px;color:#9090a8">Товаров не найдено</p></div>`;return}
  grid.innerHTML=filtered.map((p,i)=>{
    const inC=cart.some(c=>c.id===p.id);
    const imgHtml=p.img?`<img src="${p.img}" alt="${p.name}" loading="lazy">`:`<span style="position:relative;z-index:1">${p.emoji||"📦"}</span>`;
    const badgeHtml=p.badge?`<div class="card-badge ${p.badge}">${p.badge.toUpperCase()}</div>`:"";
    const adminHtml=isAdmin?`<div class="card-admin"><button class="admin-btn edit" onclick="openEditProduct(${p.id},event)">✏️</button><button class="admin-btn del" onclick="openDeleteProduct(${p.id},event)">🗑️</button></div>`:"";
    const oldHtml=p.oldPrice?`<span class="old">${p.oldPrice.toLocaleString()}₽</span>`:"";
    return `<div class="card" style="animation-delay:${i*0.055}s" onclick="openDetail(${p.id})">
      <div class="card-img">${imgHtml}${badgeHtml}${adminHtml}</div>
      <div class="card-info">
        <div class="card-name">${p.name}</div>
        <div class="card-cat">${p.cat||""}</div>
        <div class="card-foot">
          <div class="card-price">${oldHtml}${p.price.toLocaleString()}₽</div>
          <button class="add-btn${inC?" in":""}" onclick="toggleCart(${p.id},event)">${inC?"✓":"+"}</button>
        </div>
      </div>
    </div>`;
  }).join("");
  updateAdminInfo();
}

function toggleCart(id,e){
  e?.stopPropagation();
  const idx=cart.findIndex(c=>c.id===id);
  if(idx>=0){cart.splice(idx,1);showToast("Убрано из корзины")}
  else{const p=products.find(x=>x.id===id);if(p){cart.push({...p});showToast("✓ Добавлено в корзину");animCart()}}
  saveCart();updateCartBubble();renderGrid();
}
function animCart(){const b=document.getElementById("cart-bubble");b.classList.remove("pop");void b.offsetWidth;b.classList.add("pop");setTimeout(()=>b.classList.remove("pop"),400)}
function updateCartBubble(){document.getElementById("cart-num").textContent=cart.length;document.getElementById("cart-bubble").style.display=cart.length>0?"flex":"none"}

function renderCart(){
  const wrap=document.getElementById("cart-content");
  if(!cart.length){wrap.innerHTML=`<div class="cart-empty"><div style="font-size:52px;margin-bottom:11px">🛒</div><p style="font-size:15px;color:#9090a8;font-weight:600;margin-bottom:5px">Корзина пуста</p><span style="font-size:13px">Добавьте товары из каталога</span><br><br><button class="btn-primary" style="max-width:200px;margin:0 auto" onclick="showPage('shop')">В магазин</button></div>`;return}
  const total=cart.reduce((s,p)=>s+p.price,0);
  wrap.innerHTML=`<div class="cart-items">${cart.map(p=>`<div class="cart-item"><div class="cart-thumb">${p.img?`<img src="${p.img}" alt="">`:(p.emoji||"📦")}</div><div class="cart-info"><div class="cart-name">${p.name}</div><div class="cart-cat">${p.cat}</div></div><div class="cart-price">${p.price.toLocaleString()}₽</div><button class="cart-rm" onclick="toggleCart(${p.id})">✕</button></div>`).join("")}</div>
  <div class="cart-summary">
    <div class="sum-row"><span>Товаров</span><span>${cart.length} шт.</span></div>
    <div class="sum-row main"><span>Итого</span><span class="val">${total.toLocaleString()}₽</span></div>
    <button class="btn-checkout" onclick="checkout()"><svg width="15" height="15" viewBox="0 0 24 24" fill="white"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>Связаться с продавцом</button>
    <div class="checkout-hint">Уточните размер и детали напрямую у продавца в Telegram</div>
  </div>`;
}

function checkout(){
  const msg=encodeURIComponent(`Привет! Хочу заказать:\n${cart.map(p=>`• ${p.name} — ${p.price.toLocaleString()}₽`).join('\n')}\n\nИтого: ${cart.reduce((s,p)=>s+p.price,0).toLocaleString()}₽`);
  if(tg) tg.openTelegramLink(`https://t.me/housberg?text=${msg}`);
  else window.open(`https://t.me/housberg?text=${msg}`,"_blank");
}

function openDetail(id){
  const p=products.find(x=>x.id===id);if(!p)return;
  p.views=(p.views||0)+1;
  const inC=cart.some(c=>c.id===p.id);
  const imgHtml=p.img?`<img src="${p.img}" alt="">`:`<span>${p.emoji||"📦"}</span>`;
  const oldHtml=p.oldPrice?`<span class="old">${p.oldPrice.toLocaleString()}₽</span>`:"";
  const sizesHtml=p.sizes?.length?`<div class="sizes-label">Размеры</div><div class="detail-sizes">${p.sizes.map(s=>`<div class="detail-size">${s}</div>`).join("")}</div>`:"";
  document.getElementById("modal-body").innerHTML=`
    <div class="detail-img">${imgHtml}</div>
    <div class="detail-name">${p.name}</div>
    <div class="detail-cat">${p.cat}</div>
    <div class="detail-meta"><span class="meta-tag">👁 ${p.views} просм.</span>${p.badge?`<span class="meta-tag">${p.badge.toUpperCase()}</span>`:""}</div>
    <div class="detail-price">${oldHtml}${p.price.toLocaleString()}₽</div>
    ${p.desc?`<div class="detail-desc">${p.desc}</div>`:""}
    ${sizesHtml}
    <button class="btn-primary" style="${inC?'background:linear-gradient(135deg,#22c55e,#16a34a)':''}" onclick="toggleCart(${p.id});closeModal()">
      ${inC?"✓ Убрать из корзины":"🛒 Добавить в корзину"}
    </button>`;
  openModal();
}

function openAddProduct(){editingId=null;selectedSizes=[];selectedImg=null;renderProductForm()}
function openEditProduct(id,e){
  e?.stopPropagation();
  const p=products.find(x=>x.id===id);if(!p)return;
  editingId=id;selectedSizes=[...(p.sizes||[])];selectedImg=p.img||null;renderProductForm(p);
}
function openDeleteProduct(id,e){
  e?.stopPropagation();deletingId=id;
  const p=products.find(x=>x.id===id);
  document.getElementById("modal-body").innerHTML=`<div class="modal-title">Удалить товар?</div><div class="modal-sub">«${p?.name}» — это нельзя отменить.</div><button class="btn-danger" onclick="confirmDelete()">Удалить</button><button class="btn-secondary" onclick="closeModal()">Отмена</button>`;
  openModal();
}
async function confirmDelete(){
  products=products.filter(p=>p.id!==deletingId);
  cart=cart.filter(c=>c.id!==deletingId);
  saveCart();closeModal();renderGrid();renderFilters();
  showToast("🗑️ Удаляем...");
  await saveToCloud();
  showToast("🗑️ Удалено — обновлено для всех!");
}

function renderProductForm(p){
  document.getElementById("modal-body").innerHTML=`
    <div class="modal-title">${editingId?"Редактировать":"Добавить товар"}</div>
    <div class="modal-sub">Заполните информацию о товаре</div>
    <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-inp').click()"
      ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')"
      ondrop="event.preventDefault();this.classList.remove('drag');handleFileDrop(event)">
      <div id="upload-inner">${selectedImg?`<img class="upload-preview" src="${selectedImg}"><button class="upload-clear" onclick="clearImg(event)">✕</button>`:`<div class="uicon">📷</div><div class="utext">Нажмите или перетащите фото</div><div class="uhint">PNG, JPG до 10MB</div>`}</div>
    </div>
    <input type="file" id="file-inp" accept="image/*" style="display:none" onchange="handleFileSelect(this)">
    <div class="form-row">
      <div><label class="lbl">Название</label><input class="inp" id="pName" placeholder="Название" value="${p?.name||""}"></div>
      <div><label class="lbl">Категория</label><input class="inp" id="pCat" placeholder="Худи, Футболки..." value="${p?.cat||""}"></div>
    </div>
    <div class="form-group"><label class="lbl">Описание</label><textarea class="inp" id="pDesc" placeholder="Описание, материал...">${p?.desc||""}</textarea></div>
    <div class="form-row">
      <div><label class="lbl">Цена (₽)</label><input class="inp" type="number" id="pPrice" placeholder="0" value="${p?.price||""}"></div>
      <div><label class="lbl">Старая цена</label><input class="inp" type="number" id="pOld" placeholder="—" value="${p?.oldPrice||""}"></div>
    </div>
    <div class="form-group"><label class="lbl">Размеры</label>
      <div class="sizes-wrap">${["XS","S","M","L","XL","XXL","One Size"].map(s=>`<button class="sz-chip${selectedSizes.includes(s)?" active":""}" onclick="toggleSize('${s}',this)">${s}</button>`).join("")}</div>
    </div>
    <div class="form-group"><label class="lbl">Метка</label>
      <select class="inp" id="pBadge">
        <option value="" ${!p?.badge?"selected":""}>Без метки</option>
        <option value="new" ${p?.badge==="new"?"selected":""}>NEW</option>
        <option value="sale" ${p?.badge==="sale"?"selected":""}>SALE</option>
        <option value="hot" ${p?.badge==="hot"?"selected":""}>HOT</option>
      </select>
    </div>
    <button class="btn-primary" onclick="saveProduct()">${editingId?"Сохранить изменения":"Добавить товар"}</button>
    <button class="btn-secondary" onclick="closeModal()">Отмена</button>`;
  openModal();
}

function toggleSize(s,btn){
  if(selectedSizes.includes(s)) selectedSizes=selectedSizes.filter(x=>x!==s); else selectedSizes.push(s);
  btn.classList.toggle("active",selectedSizes.includes(s));
}
function handleFileSelect(input){const file=input.files[0];if(!file)return;processFile(file)}
function handleFileDrop(e){const file=e.dataTransfer.files[0];if(file&&file.type.startsWith("image/"))processFile(file)}
function processFile(file){
  if(!file.type.startsWith("image/")){showToast("⚠️ Только изображения");return}
  if(file.size>10*1024*1024){showToast("⚠️ Файл больше 10MB");return}
  const reader=new FileReader();
  reader.onload=e=>{
    selectedImg=e.target.result;
    const inner=document.getElementById("upload-inner");
    if(inner) inner.innerHTML=`<img class="upload-preview" src="${selectedImg}"><button class="upload-clear" onclick="clearImg(event)">✕</button>`;
    showToast("📷 Фото загружено!");
  };
  reader.readAsDataURL(file);
}
function clearImg(e){
  e.stopPropagation();selectedImg=null;
  const inner=document.getElementById("upload-inner");
  if(inner) inner.innerHTML=`<div class="uicon">📷</div><div class="utext">Нажмите или перетащите фото</div><div class="uhint">PNG, JPG до 10MB</div>`;
}

async function saveProduct(){
  const name=(document.getElementById("pName")?.value||"").trim();
  const cat=(document.getElementById("pCat")?.value||"").trim();
  const price=parseInt(document.getElementById("pPrice")?.value||"0");
  if(!name||!cat||!price){showToast("⚠️ Название, категория и цена обязательны");return}
  const oldPrice=parseInt(document.getElementById("pOld")?.value||"0")||null;
  const desc=(document.getElementById("pDesc")?.value||"").trim();
  const badge=document.getElementById("pBadge")?.value||"";
  const emojis={"Худи":"🧥","Футболки":"👕","Брюки":"👖","Аксессуары":"🧢","Куртки":"🫸","Обувь":"👟"};
  const item={id:editingId||Date.now(),name,cat,price,oldPrice,desc,badge,sizes:selectedSizes,img:selectedImg,emoji:emojis[cat]||"📦",views:editingId?(products.find(x=>x.id===editingId)?.views||0):0};
  if(editingId) products=products.map(p=>p.id===editingId?item:p); else products.push(item);
  closeModal();renderGrid();renderFilters();
  showToast("💾 Сохраняем...");
  await saveToCloud();
  showToast(editingId?"✏️ Обновлено — видно всем!":"✓ Товар добавлен — виден всем!");
}

function openModal(){document.getElementById("overlay").classList.add("active");document.body.style.overflow="hidden"}
function closeModal(){document.getElementById("overlay").classList.remove("active");document.body.style.overflow=""}
function overlayClick(e){if(e.target===document.getElementById("overlay"))closeModal()}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal()});

async function init(){
  loadCart();
  await loadFromCloud();
  document.getElementById("loader").classList.add("hide");
  renderFilters();
  renderGrid();
  updateCartBubble();
}
init();
</script>
</body>
</html>
